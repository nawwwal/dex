<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Surface Scaffold</title>
  <style>
    :root {
      --paper: #faf8f4;
      --margin: #e8e2d8;
      --ink: #222018;
      --approve: #2f6b4f;
      --reject: #9a3b32;
      --pending: #7a6848;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Literata", "Georgia", serif;
      background: var(--margin);
      color: var(--ink);
    }
    .ledger {
      max-width: 820px;
      margin: 0 auto;
      padding: 1rem;
    }
    header {
      background: var(--paper);
      padding: 1rem;
      border: 1px solid #cfc5b6;
      margin-bottom: 1rem;
    }
    .suggestion {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.75rem;
      align-items: start;
      background: var(--paper);
      border: 1px solid #cfc5b6;
      padding: 0.85rem;
      margin-bottom: 0.65rem;
    }
    .anchor {
      font-size: 0.75rem;
      color: var(--pending);
      font-family: "IBM Plex Sans", sans-serif;
    }
    .actions { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    button {
      font: inherit;
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.8rem;
      padding: 0.3rem 0.55rem;
      border: 1px solid #b8aea0;
      background: #fff;
      cursor: pointer;
    }
    button[data-action="approve"] { border-color: var(--approve); color: var(--approve); }
    button[data-action="reject"] { border-color: var(--reject); color: var(--reject); }
    button:focus-visible { outline: 2px solid #2a6f97; outline-offset: 2px; }
    .status { font-size: 0.75rem; font-family: "IBM Plex Sans", sans-serif; min-width: 4.5rem; text-align: right; }
    .source-assumptions, .export-output {
      margin-top: 1rem;
      padding: 0.85rem;
      background: var(--paper);
      border-left: 3px solid var(--pending);
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.9rem;
    }
    @media (max-width: 520px) {
      .suggestion { grid-template-columns: 1fr; }
      .status { text-align: left; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="ledger">
    <header>
      <strong>Review Surface</strong> — anchored suggestions with approve / reject / comment
    </header>
    <div id="suggestions"></div>
    <section class="source-assumptions" id="source-assumptions">
      <h2>Source Assumptions</h2>
      <p>Fixture excerpts, inferred gaps, and review scope boundaries.</p>
    </section>
    <section class="export-output">
      <h2>Export</h2>
      <pre id="export-prompt">Approved suggestions only; rejected items listed separately.</pre>
      <button type="button" id="copy-btn">Copy export</button>
      <span id="copy-status" aria-live="polite"></span>
    </section>
  </div>
  <script>
    const DEFAULTS = {
      items: [
        { id: "s1", anchor: "Line 12", text: "Tighten trigger description.", status: "pending", comment: "" },
        { id: "s2", anchor: "Line 28", text: "Add export contract example.", status: "pending", comment: "" }
      ]
    };
    let state = structuredClone(DEFAULTS);

    function renderSuggestions() {
      const root = document.getElementById("suggestions");
      root.replaceChildren();
      state.items.forEach((item) => {
        const row = document.createElement("article");
        row.className = "suggestion";
        row.innerHTML =
          '<div class="anchor"></div><div class="body"></div><div class="status"></div>';
        row.querySelector(".anchor").textContent = item.anchor;
        row.querySelector(".body").textContent = item.text;
        row.querySelector(".status").textContent = item.status;

        const actions = document.createElement("div");
        actions.className = "actions";
        ["approve", "reject", "comment"].forEach((action) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.dataset.action = action;
          btn.textContent = action;
          btn.addEventListener("click", () => {
            if (action === "comment") {
              const note = prompt("Comment on suggestion", item.comment || "");
              if (note !== null) item.comment = note;
            } else {
              item.status = action === "approve" ? "approved" : "rejected";
            }
            updateAll();
          });
          actions.appendChild(btn);
        });
        row.appendChild(actions);
        root.appendChild(row);
      });
    }

    function updatePrompt() {
      const approved = state.items.filter((i) => i.status === "approved");
      const rejected = state.items.filter((i) => i.status === "rejected");
      document.getElementById("export-prompt").textContent =
        "Approved: " + JSON.stringify(approved) + "\nRejected: " + JSON.stringify(rejected);
    }

    function updateAll() {
      renderSuggestions();
      updatePrompt();
    }

    document.getElementById("copy-btn").addEventListener("click", async () => {
      const status = document.getElementById("copy-status");
      try {
        await navigator.clipboard.writeText(document.getElementById("export-prompt").textContent);
        status.textContent = "Copied";
      } catch {
        status.textContent = "Copy failed";
      }
    });

    updateAll();
  </script>
</body>
</html>
